<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapa / Embed</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background:#fff; color:#1a1a2e; display:flex; flex-direction:column; min-height:100vh; }
    .embed-frame { width:100%; height:70vh; border:none; border-radius:8px; }
  </style>
</head>
<body>
  <div id="header-container"></div>

    <!-- col-md-9 offset para dejar espacio al sidebar en desktop -->
  <main class="flex-grow-1 col-md-9 ms-md-auto col-lg-10 py-5 px-4">
    <div class="container">
      <h2 class="fw-bold mb-3" style="color:#001f5b;">Ubicación del Plantel</h2>
      <!-- Reemplaza el src con el embed de Google Maps o cualquier otro iframe -->
      <div class="shadow rounded overflow-hidden">
        <iframe
          class="embed-frame"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.661!2d-99.1332!3d19.4326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sMexico+City!5e0!3m2!1ses!2smx!4v1234567890"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Mapa de ubicación">
        </iframe>
      </div>
      <p class="text-muted mt-2 small">
        ¿Problemas para ver el mapa?
        <a href="https://maps.google.com" target="_blank" class="text-primary">Ábrelo en Google Maps</a>
      </p>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
