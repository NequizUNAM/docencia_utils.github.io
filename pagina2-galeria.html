<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>body { background:#fff; color:#1a1a2e; display:flex; flex-direction:column; min-height:100vh; }</style>
</head>
<body>
  <div id="header-container"></div>

    <!-- col-md-9 offset para dejar espacio al sidebar en desktop -->
  <main class="flex-grow-1 col-md-9 ms-md-auto col-lg-10 py-5 px-4">
    <div class="container">
      <h2 class="fw-bold mb-4" style="color:#001f5b;">Galería de Imágenes</h2>
      <div class="row" id="gallery-container"></div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsrender@1.0.14/jsrender.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/templates.js"></script>
  <script>
    $(function () {
      // Controller: reemplaza con fetch a tu PHP controller para datos reales
      const imagenes = [
        { src: "https://picsum.photos/seed/a1/400/300", alt: "Foto 1", caption: "Evento escolar" },
        { src: "https://picsum.photos/seed/b2/400/300", alt: "Foto 2", caption: "Actividad deportiva" },
        { src: "https://picsum.photos/seed/c3/400/300", alt: "Foto 3", caption: "Graduación 2025" },
        { src: "https://picsum.photos/seed/d4/400/300", alt: "Foto 4", caption: "Taller de ciencias" },
        { src: "https://picsum.photos/seed/e5/400/300", alt: "Foto 5", caption: "Festival cultural" },
        { src: "https://picsum.photos/seed/f6/400/300", alt: "Foto 6", caption: "Visita museística" }
      ];
      $('#gallery-container').html($.render.galleryTpl(imagenes));
    });
  </script>
</body>
</html>
