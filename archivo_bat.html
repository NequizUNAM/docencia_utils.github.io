<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Prácticas SEIEM 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background-color: #f8f9fa; color: #333; }
        .card { border-radius: 15px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .header-custom { background: linear-gradient(135deg, #003366 0%, #004080 100%); color: white; padding: 30px; border-radius: 15px 15px 0 0; }
        #console { background: #121212; color: #00ff41; height: 450px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.85rem; padding: 20px; border-radius: 8px; border: 1px solid #333; line-height: 1.4; }
        .log-info { color: #00d4ff; }
        .log-success { color: #2ecc71; font-weight: bold; }
        .log-error { color: #e74c3c; }
        .log-warn { color: #f1c40f; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card">
        <div class="header-custom text-center">
            <h2 class="mb-2">Organizador de Archivos SEIEM</h2>
            <p class="mb-0 opacity-75">Procesamiento masivo de ZIPs de Moodle y organización por CURP</p>
        </div>
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-md-5">
                    <label class="form-label fw-bold text-uppercase small">1. Archivo de Datos (CSV)</label>
                    <input type="file" id="csvFile" class="form-control" accept=".csv">
                    <div class="form-text">Debe contener las columnas: <i>curp</i> y <i>apellidos</i>.</div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold text-uppercase small">2. Modo de Organización</label>
                    <select id="semanaSelect" class="form-select">
                        <option value="ALL">Auto-detectar Semanas (S1-S4)</option>
                        <option value="1">Solo Semana 1 (P1)</option>
                        <option value="2">Solo Semana 2 (P2)</option>
                        <option value="3">Solo Semana 3 (P3)</option>
                        <option value="4">Solo Semana 4 (P4)</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-uppercase small">3. Archivos ZIP (Carga Múltiple)</label>
                    <input type="file" id="zipFiles" class="form-control" accept=".zip" multiple>
                    <div class="form-text">Puedes seleccionar varios archivos a la vez.</div>
                </div>
                <div class="col-12 mt-4">
                    <button id="runBtn" class="btn btn-primary btn-lg w-100 shadow-sm" style="background-color: #003366; border: none;">
                        Ejecutar Organización y Descargar ZIP
                    </button>
                </div>
            </div>

            <hr class="my-4">
            
            <h6 class="fw-bold mb-2">Terminal de Procesamiento:</h6>
            <div id="console">Lista de espera vacía. Por favor, cargue los archivos...</div>
        </div>
    </div>
</div>

<script>
    const consoleDiv = document.getElementById('console');
    const runBtn = document.getElementById('runBtn');

    function log(msg, cls = '') {
        const span = document.createElement('div');
        span.className = cls ? `log-${cls}` : '';
        span.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        consoleDiv.appendChild(span);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // Función para detectar la semana basándose en el nombre largo del ZIP
    function detectarSemana(nombre) {
        const n = nombre.toUpperCase();
        if (n.includes("EVALUACIÓN 1") || n.includes("SEMANA 1") || n.includes("S1") || n.includes("P1")) return "S1";
        if (n.includes("EVALUACIÓN 2") || n.includes("SEMANA 2") || n.includes("S2") || n.includes("P2")) return "S2";
        if (n.includes("EVALUACIÓN 3") || n.includes("SEMANA 3") || n.includes("S3") || n.includes("P3")) return "S3";
        if (n.includes("EVALUACIÓN 4") || n.includes("SEMANA 4") || n.includes("S4") || n.includes("P4")) return "S4";
        
        // Si no hay etiquetas claras, buscamos números sueltos del 1 al 4
        const match = n.match(/\d/);
        if (match) {
            const num = match[0];
            if (num >= 1 && num <= 4) return "S" + num;
        }
        return null;
    }

    runBtn.addEventListener('click', async () => {
        const csv = document.getElementById('csvFile').files[0];
        const zips = document.getElementById('zipFiles').files;
        const targetSemana = document.getElementById('semanaSelect').value;

        if (!csv || zips.length === 0) {
            alert("Por favor, selecciona el archivo CSV y los ZIPs de entrada.");
            return;
        }

        consoleDiv.innerHTML = "";
        log("Iniciando motor de organización masiva...", "info");
        runBtn.disabled = true;

        const masterZip = new JSZip();
        const mapZips = { S1: [], S2: [], S3: [], S4: [] };
        const faltantes = { S1: "", S2: "", S3: "", S4: "" };

        try {
            // 1. Clasificar todos los ZIPs cargados
            for (const file of zips) {
                const detect = detectarSemana(file.name);
                if (detect) {
                    const content = await JSZip.loadAsync(file);
                    mapZips[detect].push(content);
                    log(`ZIP Identificado como ${detect}: ${file.name.substring(0, 40)}...`, "success");
                } else {
                    log(`ZIP Ignorado (Semana no detectada): ${file.name}`, "warn");
                }
            }

            // 2. Leer CSV
            Papa.parse(csv, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    const data = results.data;
                    log(`Total alumnos en CSV: ${data.length}`, "info");

                    const semanas = targetSemana === "ALL" ? ["S1", "S2", "S3", "S4"] : ["S" + targetSemana];

                    for (const sKey of semanas) {
                        const pNum = sKey.replace("S", "P");
                        const zipsSemana = mapZips[sKey];

                        if (zipsSemana.length === 0) {
                            log(`No hay archivos cargados para la ${sKey}. Continuando...`, "warn");
                            continue;
                        }

                        log(`--- PROCESANDO ${sKey} (${pNum}) ---`, "info");

                        for (const row of data) {
                            const curp = (row.curp || "").trim();
                            const nombre = (row.apellidos || "").trim();
                            if (!curp) continue;

                            let encontrado = false;

                            // Buscar en cada ZIP que pertenezca a esta semana
                            for (const zip of zipsSemana) {
                                for (const path in zip.files) {
                                    // Comprobamos si el path contiene la CURP (formato Moodle)
                                    if (path.toUpperCase().includes(curp.toUpperCase())) {
                                        const entry = zip.files[path];
                                        if (!entry.dir) {
                                            const blob = await entry.async("blob");
                                            const pureFileName = path.split('/').pop();
                                            // Estructura exacta solicitada
                                            masterZip.file(`2026_CURPS/${curp}/${pNum}/${pureFileName}`, blob);
                                            encontrado = true;
                                        }
                                    }
                                }
                            }

                            if (encontrado) {
                                log(`ENCONTRADO: ${curp} (${nombre.substring(0, 20)})`, "success");
                            } else {
                                log(`FALTA: ${curp}`, "error");
                                faltantes[sKey] += `PARTICIPANTE no encontrado: '${curp} ${nombre}', Curso: '${row.nomcurso}', Asesor: '${row.asesor}'\n`;
                            }
                        }

                        // Guardar log de faltantes si existen
                        if (faltantes[sKey]) {
                            masterZip.file(`faltan${sKey}_${pNum}.txt`, faltantes[sKey]);
                        }
                    }

                    // 3. Empaquetar y Descargar
                    log("Generando descarga final... Por favor espere.", "info");
                    const content = await masterZip.generateAsync({ type: "blob" });
                    const url = URL.createObjectURL(content);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "ORGANIZACION_2026_TOTAL.zip";
                    a.click();

                    log("¡PROCESO COMPLETADO!", "success");
                    runBtn.disabled = false;
                }
            });
        } catch (e) {
            log(`ERROR CRÍTICO: ${e.message}`, "error");
            runBtn.disabled = false;
        }
    });
</script>

</body>
</html>
