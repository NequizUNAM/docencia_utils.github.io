<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD - Visualización</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Estilo específico para resaltar la imagen */
        .image-container {
            position: relative;
            background: white;
            padding: 15px;
            border-radius: 20px;
            /* Sombra suave y profunda para efecto de elevación */
            box-shadow: 0 20px 40px rgba(10, 25, 47, 0.12);
            transition: transform 0.3s ease;
        }

        .image-container:hover {
            transform: translateY(-5px);
        }

        .img-hero {
            width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            /* Filtro suave para que los colores se integren */
            filter: saturate(1.1);
        }

        .glass-badge {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--azul-marino);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-mobile border-bottom px-3 py-2 d-md-none bg-white sticky-top">
    <button class="btn btn-outline-dark border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
        <i class="bi bi-list fs-3"></i>
    </button>
    <span class="fw-bold" style="color: var(--dorado);">DASHBOARD</span>
</nav>

<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold">MENÚ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body" id="menuMobileContent"></div>
</div>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebar" class="col-md-3 col-lg-2 d-none d-md-block p-3 shadow-sm">
            <div class="text-center mb-4">
                <h4 class="fw-bold" style="color: var(--azul-marino);">DASHBOARD</h4>
                <hr>
            </div>
            <ul class="nav flex-column" id="mainMenu">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        <i class="bi bi-file-earmark-plus me-2"></i> Nueva Evaluación
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="convertidor.html">
                        <i class="bi bi-image me-2"></i> Convertidor de Imágenes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="pagina3.html">
                        <i class="bi bi-info-circle me-2"></i> Información Visual
                    </a>
                </li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="container">
                <header class="mb-5 text-center">
                    <h2 class="fw-bold display-6" style="color: var(--azul-marino);">Galería de Recursos</h2>
                    <p class="text-muted">Visualización de contenido institucional</p>
                </header>

                <div class="row justify-content-center">
                    <div class="col-lg-12">
                        <div class="image-container">
                            <img src="images/calendarioIEBM_Abril.jpeg" alt="Imagen Institucional" class="img-hero shadow-inner">
                            
                            <div class="glass-badge">
                                <i class="bi bi-stars me-2" style="color: var(--dorado);"></i>
                                Recurso Educativo v1.0
                            </div>
                        </div>
                        
                        <div class="mt-4 text-center">
                            <p class="small text-muted">Usa este espacio para proyectar o consultar material gráfico de apoyo.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function() {
        $("#menuMobileContent").html($("#mainMenu").clone());
    });
</script>
</body>
</html>
