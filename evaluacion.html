<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD - Reporte Educativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
        <style>
        :root {
            --azul-marino: #003366;
            --azul-claro: #f4f7f6;
        }
        body {
            background-color: var(--azul-claro);
            font-family: 'Segoe UI', sans-serif;
        }
        /* Estilos del Sidebar extraídos de tu página */
        #sidebar {
            min-height: 100vh;
            background: white;
        }
        .nav-link {
            color: #333;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .nav-link.active {
            background-color: var(--azul-marino) !important;
            color: white !important;
        }
        /* Estilos de la Infografía */
        .card-custom {
            border-radius: 8px;
            border: none;
            border-left: 5px solid var(--azul-marino);
            transition: transform 0.2s;
            height: 100%;
        }
        .card-custom:hover {
            transform: translateY(-5px);
        }
        .header-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-bottom: 3px solid var(--azul-marino);
        }
        .icon-box {
            font-size: 1.5rem;
            color: var(--azul-marino);
            margin-right: 10px;
        }
        .highlight-red { color: #d9534f; font-weight: bold; }
        .url-banner {
            background: #eef2f7;
            border: 1px dashed var(--azul-marino);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
       <nav id="sidebar" class="col-md-3 col-lg-2 d-none d-md-block p-3 shadow-sm position-fixed">
            <div class="text-center mb-4">
                <h4 class="fw-bold text-primary-emphasis">DASHBOARD</h4>
                <hr>
            </div>
            <ul class="nav flex-column" id="mainMenu">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        <i class="bi bi-calendar3 me-2"></i> CALENDARIO
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="evaluacion.html">
                        <i class="bi bi-chat-left-quote me-2"></i> FORO DE EVALUACIÓN
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="convertidor.html">
                        <i class="bi bi-image me-2"></i> CONVERTIDOR IMAGENES
                    </a>
                </li>
                
                <hr class="text-muted">
                <div class="small fw-bold text-muted mb-2 ps-3">GUÍAS SEMANALES</div>

                <li class="nav-item">
                    <a class="nav-link" href="semana1.html">
                        <i class="bi bi-1-square me-2"></i> SEMANA 1
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="semana2.html">
                        <i class="bi bi-2-square me-2"></i> SEMANA 2
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="semana3.html">
                        <i class="bi bi-3-square me-2"></i> SEMANA 3
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="semana4.html">
                        <i class="bi bi-4-square me-2"></i> SEMANA 4
                    </a>
                </li>

                <hr class="text-muted">
                
                <li class="nav-item">
                    <a class="nav-link" href="manual.html">
                        <i class="bi bi-book me-2"></i> MANUAL ASESORES
                    </a>
                </li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="container">
                <div class="card card-custom p-4 mb-5 shadow-sm">
                    <h3 class="fw-bold mb-4" style="color: var(--azul-marino);">Generador de Reportes</h3>
                    
                    <form id="evaluacionForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">NOMBRES DEL ALUMNO</label>
                            <input type="text" id="nombre" class="form-control form-control-lg border-2" placeholder="Ej. Juan Pérez" required>
                        </div>

                        <div id="preguntasContainer" class="row g-3">
                            </div>

                        <div class="d-flex justify-content-between mt-5 pt-3 border-top">
                            <button type="button" class="btn btn-outline-secondary px-4" onclick="resetForm()">
                                <i class="bi bi-arrow-counterclockwise me-2"></i>Limpiar
                            </button>
                            <button type="button" class="btn btn-primary px-5 fw-bold" onclick="procesarYEvaluar()" style="background-color: var(--azul-marino);">
                                <i class="bi bi-file-earmark-check me-2"></i>Generar Reporte
                            </button>
                        </div>
                    </form>
                </div>

                <div class="table-container shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold m-0" style="color: var(--azul-marino);">Histórico Reciente</h4>
                        <span class="badge bg-light text-dark border">Últimos 35 registros</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 18%;">Fecha/Hora</th>
                                    <th>Reporte Detallado</th>
                                    <th class="text-center">Total</th>
                                </tr>
                            </thead>
                            <tbody id="historicoTabla">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script id="preguntaTemplate" type="text/x-jsrender">
    {{for preguntas}}
    <div class="col-md-6 mb-3">
        <label class="form-label small fw-bold text-secondary">{{:label}}</label>
        <select class="form-select respuesta shadow-sm border-secondary-subtle">
            <option value="">Seleccionar...</option>
            <option value="25">Correcta (25 pts)</option>
            <option value="13">Parcial (13 pts)</option>
            <option value="0">Incorrecta (0 pts)</option>
        </select>
    </div>
    {{/for}}
</script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrender/1.0.15/jsrender.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // Tu lógica de RegistroManager y funciones se mantienen igual, 
    // solo asegúrate de que el render use las clases del nuevo CSS.
    class RegistroManager {
        constructor() {
            this.key = 'historico_DASHBOARD';
            this.limite = 35;
        }

        guardar(registro) {
            let actual = this.obtener();
            actual.unshift(registro);
            if(actual.length > this.limite) actual = actual.slice(0, this.limite);
            localStorage.setItem(this.key, JSON.stringify(actual));
            this.render();
        }

        obtener() {
            return JSON.parse(localStorage.getItem(this.key) || "[]");
        }

        render() {
            const data = this.obtener();
            const html = data.map(r => `
                <tr>
                    <td><span class="badge bg-info-subtle text-info-emphasis border border-info-subtle">${r.fecha}</span></td>
                    <td><div class="texto-reporte">${r.textoCompleto}</div></td>
                    <td class="text-center"><h4 class="fw-bold text-primary m-0">${r.total}</h4></td>
                </tr>
            `).join('');
            $("#historicoTabla").html(html || '<tr><td colspan="3" class="text-center p-5 text-muted">No hay registros disponibles.</td></tr>');
        }
    }

    const manager = new RegistroManager();

    $(document).ready(function() {
        const data = {
            preguntas: [
                { label: "PREGUNTA 1" }, { label: "PREGUNTA 2" },
                { label: "PREGUNTA 3" }, { label: "PREGUNTA 4" }
            ]
        };
        $("#preguntasContainer").html($.templates("#preguntaTemplate").render(data));
        manager.render();
    });

    function resetForm() {
        $("#evaluacionForm")[0].reset();
    }

    function procesarYEvaluar() {
        const nombre = $("#nombre").val().toUpperCase().trim();
        const respuestas = $(".respuesta").map(function() { return $(this).val(); }).get();

        if(!nombre || respuestas.includes("")) {
            Swal.fire('Atención', 'Por favor completa el nombre y todas las preguntas.', 'warning');
            return;
        }

        const pts = respuestas.map(v => parseInt(v));
        const total = pts.reduce((a, b) => a + b, 0);
        const fecha = new Date().toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'short' });

        let textoCompleto = `ALUMNO: ${nombre}\n`;
        respuestas.forEach((val, i) => {
            textoCompleto += `P${i+1}: ${val} pts\n`;
        });
        textoCompleto += `TOTAL: ${total} PTS`;

        manager.guardar({ fecha, textoCompleto, total });

        Swal.fire({
            title: '¡Reporte Listo!',
            html: `<div class="text-start bg-light p-3 rounded mt-2"><pre class="m-0">${textoCompleto}</pre></div>`,
            icon: 'success',
            confirmButtonColor: '#003366'
        });

        resetForm();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
