<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Itinerario de Capacitación 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root { --azul-marino: #003366; --morado: #6a1b9a; }
    body { background-color:#ffffff; color:#1a1a2e; display:flex; flex-direction:column; min-height:100vh; }
    .card-custom {
      border-radius: 8px;
      border: none;
      border-left: 5px solid var(--azul-marino);
    }
    .etapa-header {
      color: white;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 4px;
    }
    .etapa-azul { background-color: var(--azul-marino); }
    .etapa-morado { background-color: var(--morado); }
    .table-itinerario td { vertical-align: middle; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <!-- col-md-9 offset para dejar espacio al sidebar en desktop -->
  <main class="flex-grow-1 col-md-9 ms-md-auto col-lg-10 py-5 px-4">
    <div class="container">
      <div class="card card-custom p-4 shadow-sm">
        <h2 class="fw-bold mb-1" style="color: var(--azul-marino);">Itinerario de Capacitación 2026</h2>
        <p class="text-muted mb-4">Convocatoria de Capacitación — Fechas de inicio y término por actividad</p>

        <div class="table-responsive">
          <table class="table table-hover align-middle table-itinerario">
            <thead style="background: var(--azul-marino); color:white;">
              <tr>
                <th>Actividad</th>
                <th class="text-center">Inicio</th>
                <th class="text-center">Término</th>
              </tr>
            </thead>
            <tbody id="itinerario-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script id="itinerarioTemplate" type="text/x-jsrender">
    {{for actividades}}
      {{if esEtapa}}
      <tr>
        <td colspan="3" class="etapa-header {{:claseColor}}">{{:actividad}}</td>
      </tr>
      {{else}}
      <tr>
        <td>{{:actividad}}</td>
        <td class="text-center">{{:inicio}}</td>
        <td class="text-center">{{:termino}}</td>
      </tr>
      {{/if}}
    {{/for}}
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsrender@1.0.14/jsrender.min.js"></script>
  <script src="js/app.js"></script>

  <script>
    $(function () {
      // Controller: aquí conectarías con fetch('/controller.php?action=itinerario') para datos dinámicos
      const actividades = [
        { actividad: "Publicación de Convocatoria de Capacitación 2026", inicio: "21-jul", termino: "21-jul" },

        { esEtapa: true, actividad: "1° ETAPA", claseColor: "etapa-azul" },
        { actividad: "Inscripciones Capacitación Promoción", inicio: "03-ago", termino: "16-ago" },
        { actividad: "Inscripciones Capacitación Nuevo Ingreso", inicio: "17-ago", termino: "18-ago" },
        { actividad: "Proceso de asignación Promoción", inicio: "03-ago", termino: "21-ago" },
        { actividad: "Proceso de asignación Nuevo Ingreso", inicio: "17-ago", termino: "21-ago" },
        { actividad: "Conformación de grupos", inicio: "03-ago", termino: "21-ago" },
        { actividad: "Capacitación 1° período", inicio: "24-ago", termino: "04-sep" },
        { actividad: "Capacitación 2° período", inicio: "07-sep", termino: "18-sep" },
        { actividad: "Capacitación 3° período (sujeto a demanda)", inicio: "21-sep", termino: "02-oct" },
        { actividad: "Carga calificaciones", inicio: "14-sep", termino: "11-oct" },
        { actividad: "Recibir entregables", inicio: "24-jul", termino: "22-oct" },

        { esEtapa: true, actividad: "2° ETAPA", claseColor: "etapa-morado" },
        { actividad: "Inscripciones Capacitación", inicio: "14-sep", termino: "25-sep" },
        { actividad: "Proceso de asignación", inicio: "14-sep", termino: "02-oct" },
        { actividad: "Conformación de grupos", inicio: "14-sep", termino: "02-oct" },
        { actividad: "Capacitación 1° Período", inicio: "05-oct", termino: "16-oct" },
        { actividad: "Capacitación 2° Período", inicio: "19-oct", termino: "30-oct" },
        { actividad: "Capacitación 3° período (sujeto a demanda)", inicio: "02-nov", termino: "13-nov" },
        { actividad: "Carga calificaciones", inicio: "26-oct", termino: "23-nov" },
        { actividad: "Recibir entregables", inicio: "14-sep", termino: "03-dic" }
      ];

      $("#itinerario-body").html($.templates("#itinerarioTemplate").render({ actividades }));
    });
  </script>
</body>
</html>
