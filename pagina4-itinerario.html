<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Itinerario Escolar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>body { background:#fff; color:#1a1a2e; display:flex; flex-direction:column; min-height:100vh; }</style>
</head>
<body>
  <div id="header-container"></div>

    <!-- col-md-9 offset para dejar espacio al sidebar en desktop -->
  <main class="flex-grow-1 col-md-9 ms-md-auto col-lg-10 py-5 px-4">
    <div class="container">
      <h2 class="fw-bold mb-1" style="color:#001f5b;">Itinerario Escolar</h2>
      <p class="text-muted mb-4">Ciclo escolar 2026 — Actividades programadas</p>
      <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle mb-0">
          <thead style="background:#001f5b; color:white;">
            <tr>
              <th>Hora</th>
              <th>Actividad</th>
              <th>Lugar</th>
              <th>Responsable</th>
            </tr>
          </thead>
          <tbody id="itinerario-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsrender@1.0.14/jsrender.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/templates.js"></script>
  <script>
    $(function () {
      // Controller: reemplaza con fetch('/api/itinerario') para datos dinámicos
      const actividades = [
        { hora: "08:00", actividad: "Ceremonia de inicio",       lugar: "Auditorio",   responsable: "Dirección" },
        { hora: "09:00", actividad: "Taller de matemáticas",     lugar: "Aula 101",    responsable: "Prof. García" },
        { hora: "10:30", actividad: "Receso",                    lugar: "Patio",       responsable: "Prefectura" },
        { hora: "11:00", actividad: "Ciencias naturales",        lugar: "Laboratorio", responsable: "Prof. López" },
        { hora: "12:30", actividad: "Actividad deportiva",       lugar: "Cancha",      responsable: "Prof. Ruiz" },
        { hora: "14:00", actividad: "Conferencia de padres",     lugar: "Sala magna",  responsable: "Subdirección" },
        { hora: "15:30", actividad: "Cierre y evaluación",       lugar: "Auditorio",   responsable: "Dirección" }
      ];
      $('#itinerario-body').html($.render.itinerarioTpl(actividades));
    });
  </script>
</body>
</html>
