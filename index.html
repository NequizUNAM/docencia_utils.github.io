<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD - Reporte Educativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebar" class="col-md-3 col-lg-2 d-none d-md-block p-3 shadow-sm">
            <div class="text-center mb-4">
                <h4 class="fw-bold" style="color: var(--azul-marino);">DASHBOARD</h4>
                <hr>
            </div>
            <ul class="nav flex-column" id="mainMenu">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
                        <i class="bi bi-file-earmark-plus me-2"></i> Nueva Evaluación
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="convertidor.html">
                        <i class="bi bi-image me-2"></i> Convertidor de Imágenes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link disabled" href="#">
                        <i class="bi bi-lock me-2"></i> Próximamente
                    </a>
                </li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="container">
                <div class="card card-custom p-4 mb-5">
                    <h3 class="fw-bold mb-4" style="color: var(--azul-marino);">Generador de Reportes</h3>
                    
                    <form id="evaluacionForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold">NOMBRES DEL ALUMNO</label>
                            <input type="text" id="nombre" class="form-control form-control-lg shadow-sm" placeholder="Escriba aquí..." required>
                        </div>

                        <div id="preguntasContainer">
                            </div>

                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-secondary px-4 shadow-sm" onclick="resetForm()">
                                <i class="bi bi-arrow-counterclockwise me-2"></i>Limpiar
                            </button>
                            <button type="button" class="btn btn-outline-sucess px-5 shadow-sm" onclick="procesarYEvaluar()">
                                <i class="bi bi-file-earmark-check me-2"></i>Generar 
                            </button>
                        </div>
                    </form>
                </div>

                <div class="table-container shadow-sm">
                    <h4 class="fw-bold mb-4 text-primary">Histórico (Últimos 35)</h4>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 15%;">Fecha/Hora</th>
                                    <th>Reporte Completo</th>
                                    <th class="text-center">Total</th>
                                </tr>
                            </thead>
                            <tbody id="historicoTabla">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script id="preguntaTemplate" type="text/x-jsrender">
    {{for preguntas}}
    <div class="mb-3">
        <label class="form-label small fw-bold">{{:label}}</label>
        <select class="form-select respuesta shadow-sm">
            <option value="">Seleccionar...</option>
            <option value="25">Respuesta Correcta (25 pts)</option>
            <option value="13">Respuesta Parcial (13 pts)</option>
            <option value="0">Respuesta Incorrecta (0 pts)</option>
        </select>
    </div>
    {{/for}}
</script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrender/1.0.15/jsrender.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    class RegistroManager {
        constructor() {
            this.key = 'historico_DASHBOARD';
            this.limite = 35;
        }

        guardar(registro) {
            let actual = this.obtener();
            actual.unshift(registro);
            if(actual.length > this.limite) actual = actual.slice(0, this.limite);
            localStorage.setItem(this.key, JSON.stringify(actual));
            this.render();
        }

        obtener() {
            return JSON.parse(localStorage.getItem(this.key) || "[]");
        }

        render() {
            const data = this.obtener();
            const html = data.map(r => `
                <tr>
                    <td><span class="badge bg-light text-dark">${r.fecha}</span></td>
                    <td><div class="texto-reporte">${r.textoCompleto}</div></td>
                    <td class="text-center"><h4 class="fw-bold text-primary">${r.total}</h4></td>
                </tr>
            `).join('');
            $("#historicoTabla").html(html || '<tr><td colspan="3" class="text-center">No hay registros aún.</td></tr>');
        }
    }

    const manager = new RegistroManager();

    $(document).ready(function() {
        const data = {
            preguntas: [
                { label: "PREGUNTA 1" }, { label: "PREGUNTA 2" },
                { label: "PREGUNTA 3" }, { label: "PREGUNTA 4" }
            ]
        };
        $("#preguntasContainer").html($.templates("#preguntaTemplate").render(data));
        manager.render();
    });

    function resetForm() {
        $("#evaluacionForm")[0].reset();
    }

    function procesarYEvaluar() {
        const nombre = $("#nombre").val().toUpperCase().trim();
        const respuestas = $(".respuesta").map(function() { return $(this).val(); }).get();

        if(!nombre || respuestas.includes("")) {
            Swal.fire('Error', 'Por favor llena todos los campos.', 'error');
            return;
        }

        const pts = respuestas.map(v => parseInt(v));
        const total = pts.reduce((a, b) => a + b, 0);
        const fecha = new Date().toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'short' });

        // CONSTRUCCIÓN DEL TEXTO EXACTO
        let textoCompleto = `HOLA ${nombre}\n`;
        respuestas.forEach((val, i) => {
            textoCompleto += `PREGUNTA ${i+1} - ${val}\n`;
        });
        textoCompleto += `TOTAL ${total}`;

        manager.guardar({
            fecha,
            textoCompleto,
            total
        });

        Swal.fire({
            title: 'Reporte Generado',
            html: `<div class="text-start"><pre>${textoCompleto}</pre></div>`,
            icon: 'success',
            confirmButtonColor: '#0a192f'
        });

        resetForm();
    }
</script>
</body>
</html>
