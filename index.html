<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inicio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #ffffff; color: #1a1a2e; display:flex; flex-direction:column; min-height:100vh; }
    .hero { background: linear-gradient(135deg, #001f5b, #1a1a2e); color: white; padding: 80px 20px; }
  </style>
</head>
<body>
  <div id="header-container"></div>

    <!-- col-md-9 offset para dejar espacio al sidebar en desktop -->
  <main class="flex-grow-1 col-md-9 ms-md-auto col-lg-10 py-5 px-4">
    <div class="hero text-center">
      <h1 class="display-4 fw-bold">Bienvenido</h1>
      <p class="lead">Plataforma escolar — Selecciona una sección del menú</p>
    </div>
    <div class="container my-5" id="cards-container"></div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsrender@1.0.14/jsrender.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/templates.js"></script>
  <script>
    $(function () {
      const data = [
        { title: "Formulario Moodle",     body: "Formulario para plataforma Moodle." },
        { title: "Convertidor Imágenes",  body: "Redimensiona las Imágene sy descarga en formato jpg" },
        { title: "Documento PDF",         body: "Consulta el documento oficial en línea." },
        { title: "Itinerario Escolar",    body: "Agenda de actividades y horarios." },
        { title: "Mapa / Embed",          body: "Ubicación e información embebida." }
      ];
      const html = $.render.cardTpl(data);
      $('#cards-container').html(
        '<div class="row row-cols-1 row-cols-md-3 g-4">' + html + '</div>'
      );
    });
  </script>
</body>
</html>
