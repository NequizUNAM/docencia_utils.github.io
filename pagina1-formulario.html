<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root { --azul-marino: #003366; }
    body { background-color:#ffffff; color:#1a1a2e; display:flex; flex-direction:column; min-height:100vh; }
    .card-custom {
      border-radius: 8px;
      border: none;
      border-left: 5px solid var(--azul-marino);
    }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <!-- col-md-9 offset para dejar espacio al sidebar en desktop -->
  <main class="flex-grow-1 col-md-9 ms-md-auto col-lg-10 py-5 px-4">
    <div class="container" style="max-width:600px;">
      <div class="card card-custom p-4 shadow-sm">
        <h2 class="fw-bold mb-4" style="color:#001f5b;">Formulario de Contacto</h2>
        <form id="contactForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre completo</label>
            <input type="text" class="form-control" id="nombre" placeholder="Juan Pérez" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Asunto</label>
            <select class="form-select" id="asunto">
              <option value="">Selecciona...</option>
              <option>Información general</option>
              <option>Inscripciones</option>
              <option>Actividades escolares</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mensaje</label>
            <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe tu mensaje..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold" style="background-color:#001f5b; border-color:#001f5b;">Enviar</button>
          <div id="formMsg" class="mt-3"></div>
        </form>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsrender@1.0.14/jsrender.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    $('#contactForm').on('submit', function(e) {
      e.preventDefault();
      // Controller: aquí conectarías con PHP controller vía fetch/POST
      $('#formMsg').html('<div class="alert alert-success">¡Mensaje enviado correctamente!</div>');
      this.reset();
    });
  </script>
</body>
</html>
