<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD - Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
    <style>
        :root {
            --azul-marino: #003366;
            --azul-claro: #f4f7f6;
        }
        body {
            background-color: var(--azul-claro);
            font-family: 'Segoe UI', sans-serif;
        }
        #sidebar {
            min-height: 100vh;
            background: white;
        }
        .nav-link {
            color: #333;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .nav-link.active {
            background-color: var(--azul-marino) !important;
            color: white !important;
        }
        .card-custom {
            border-radius: 8px;
            border: none;
            border-left: 5px solid var(--azul-marino);
            transition: transform 0.2s;
            height: 100%;
        }
        .card-custom:hover {
            transform: translateY(-5px);
        }
        .navbar-mobile span {
            color: var(--azul-marino);
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR MÓVIL ===== -->
<nav class="navbar navbar-mobile border-bottom px-3 py-2 d-md-none bg-white sticky-top">
    <button class="btn btn-outline-dark border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
        <i class="bi bi-list fs-3"></i>
    </button>
    <span class="fw-bold">DASHBOARD</span>
</nav>

<!-- ===== OFFCANVAS MÓVIL ===== -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
    <div class="offcanvas-header border-bottom">
        <h5 class="offcanvas-title fw-bold">MENÚ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body" id="menuMobileContent"></div>
</div>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebar" class="col-md-3 col-lg-2 d-none d-md-block p-3 shadow-sm position-fixed">
            <div class="text-center mb-4">
                <h4 class="fw-bold text-primary-emphasis">DASHBOARD</h4>
                <hr>
            </div>
            <ul class="nav flex-column" id="mainMenu">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-calendar3 me-2"></i> CALENDARIO</a></li>
                <li class="nav-item"><a class="nav-link" href="evaluacion.html"><i class="bi bi-chat-left-quote me-2"></i> FORO DE EVALUACIÓN</a></li>
                <li class="nav-item"><a class="nav-link active" href="pagina1-formulario.html"><i class="bi bi-ui-checks me-2"></i> FORMULARIO</a></li>
                <li class="nav-item"><a class="nav-link" href="convertidor.html"><i class="bi bi-image me-2"></i> CONVERTIDOR IMAGENES</a></li>
                <li class="nav-item"><a class="nav-link" href="archivo_bat.html"><i class="bi bi-gear-fill me-2"></i> ORGANIZADOR ZIP</a></li>
                <hr class="text-muted">
                <div class="small fw-bold text-muted mb-2 ps-3">GUÍAS SEMANALES</div>
                <li class="nav-item"><a class="nav-link" href="semana1.html"><i class="bi bi-1-square me-2"></i> SEMANA 1</a></li>
                <li class="nav-item"><a class="nav-link" href="semana2.html"><i class="bi bi-2-square me-2"></i> SEMANA 2</a></li>
                <li class="nav-item"><a class="nav-link" href="semana3.html"><i class="bi bi-3-square me-2"></i> SEMANA 3</a></li>
                <li class="nav-item"><a class="nav-link" href="semana4.html"><i class="bi bi-4-square me-2"></i> SEMANA 4</a></li>
                <hr class="text-muted">
                <li class="nav-item"><a class="nav-link" href="manual.html"><i class="bi bi-book me-2"></i> MANUAL ASESORES</a></li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="container">
                <div class="card card-custom p-4 mb-5 shadow-sm">
                    <h3 class="fw-bold mb-4" style="color: var(--azul-marino);">Formulario de Contacto</h3>

                    <form id="contactForm" novalidate>
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">NOMBRE COMPLETO</label>
                            <input type="text" id="nombre" class="form-control form-control-lg border-2" placeholder="Ej. Juan Pérez" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">CORREO ELECTRÓNICO</label>
                            <input type="email" id="correo" class="form-control form-control-lg border-2" placeholder="correo@ejemplo.com" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">ASUNTO</label>
                            <select id="asunto" class="form-select form-select-lg border-2">
                                <option value="">Seleccionar...</option>
                                <option>Información general</option>
                                <option>Inscripciones</option>
                                <option>Actividades escolares</option>
                                <option>Soporte técnico</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">MENSAJE</label>
                            <textarea id="mensaje" class="form-control border-2" rows="4" placeholder="Escribe tu mensaje..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-5 pt-3 border-top">
                            <button type="button" class="btn btn-outline-secondary px-4" onclick="resetForm()">
                                <i class="bi bi-arrow-counterclockwise me-2"></i>Limpiar
                            </button>
                            <button type="button" class="btn btn-primary px-5 fw-bold" onclick="enviarFormulario()" style="background-color: var(--azul-marino);">
                                <i class="bi bi-send-check me-2"></i>Enviar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrender/1.0.15/jsrender.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    $(document).ready(function() {
        // Clona menú desktop → offcanvas móvil sin duplicar HTML
        const clone = document.querySelector('#mainMenu').cloneNode(true);
        clone.id = 'mainMenuMobile';
        document.querySelector('#menuMobileContent').appendChild(clone);
    });

    function resetForm() {
        $("#contactForm")[0].reset();
    }

    function enviarFormulario() {
        const nombre = $("#nombre").val().trim();
        const correo = $("#correo").val().trim();
        const asunto = $("#asunto").val();
        const mensaje = $("#mensaje").val().trim();

        if (!nombre || !correo || !asunto || !mensaje) {
            Swal.fire('Atención', 'Completa todos los campos.', 'warning');
            return;
        }

        // Controller: aquí conectarías con fetch('/controller.php') vía PHP
        Swal.fire({
            title: '¡Enviado!',
            text: 'Tu mensaje se envió correctamente.',
            icon: 'success',
            confirmButtonColor: '#003366'
        });

        resetForm();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
